name: Docker Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-push:
    needs: check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute version
        id: version
        run: |
          BASE="1.0"
          RUN="${{ github.run_number }}"
          echo "value=v${BASE}.${RUN}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          docker build -t ghcr.io/optikk-org/optikk-lens-frontend:latest \
                       -t ghcr.io/optikk-org/optikk-lens-frontend:${{ steps.version.outputs.value }} .
          docker push ghcr.io/optikk-org/optikk-lens-frontend:latest
          docker push ghcr.io/optikk-org/optikk-lens-frontend:${{ steps.version.outputs.value }}
