name: Deploy to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can count commits since VERSION was last changed
          # (used to auto-bump the patch segment).
          fetch-depth: 0

      # ghcr.io requires lowercase paths; github.repository keeps org casing (e.g. Optikk-Org).
      - name: Image name (lowercase)
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image tags:
      #   latest                       — always moves with main (rolling)
      #   <effective>                  — auto-bumped semver (MAJOR.MINOR from VERSION,
      #                                  PATCH = commits since VERSION last changed)
      #   <effective>-<shortSha>       — immutable per-commit tag
      #   sha-<shortSha>               — explicit commit tag
      #
      # MAJOR and MINOR are pinned in the repo-root VERSION file (three-part, e.g. "1.0.0").
      # PATCH is computed as the number of commits since that file was last edited, so every
      # push to main advances the patch (1.0.0, 1.0.1, 1.0.2, ...). Bump VERSION by hand to
      # reset the counter for a new MINOR / MAJOR series.
      - name: Resolve image version
        id: version
        run: |
          if [[ ! -f VERSION ]]; then
            echo "::error::Missing repo-root VERSION file. Add VERSION containing one line like 1.0.0 (same commit as this workflow)."
            exit 1
          fi
          RAW="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$RAW" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::VERSION must be MAJOR.MINOR.PATCH (e.g. 1.0.0), got: $RAW"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          BASE_PATCH="${BASH_REMATCH[3]}"

          # Commit that last touched VERSION (falls back to first commit if never edited).
          VERSION_COMMIT="$(git log -n 1 --format=%H -- VERSION || true)"
          if [[ -z "$VERSION_COMMIT" ]]; then
            VERSION_COMMIT="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          # Commits on HEAD since VERSION was last changed, exclusive of that commit.
          COMMITS_SINCE="$(git rev-list --count "${VERSION_COMMIT}..HEAD")"

          # Patch floor honors any manual bump in VERSION itself.
          PATCH=$(( BASE_PATCH + COMMITS_SINCE ))

          EFFECTIVE="${MAJOR}.${MINOR}.${PATCH}"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "Resolved image version: $EFFECTIVE (base=$RAW, commits_since_VERSION=$COMMITS_SINCE)"
          echo "version=$EFFECTIVE" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version_sha=${EFFECTIVE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.version.outputs.short_sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_SHA: ${{ steps.version.outputs.version_sha }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          {
            echo "### Published tags"
            echo ""
            echo "- \`${REGISTRY}/${IMAGE_NAME}:latest\` (rolling)"
            echo "- \`${REGISTRY}/${IMAGE_NAME}:${VERSION}\` (auto-bumped semver)"
            echo "- \`${REGISTRY}/${IMAGE_NAME}:${VERSION_SHA}\` (immutable per-commit)"
            echo "- \`${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}\` (commit tag)"
          } >> "$GITHUB_STEP_SUMMARY"
